
[tool.towncrier]
package = "pyrogram"
filename = "../../../docs/source/releases/changes-in-this-fork.rst"
directory = "docs/source/news/"
template = ".template.rst.jinja2"
issue_format = "`#{issue} <https://github.com/TelegramPlayGround/Pyrogram/issues/{issue}>`_"

[[tool.towncrier.section]]
path = ""

[[tool.towncrier.type]]
directory = "feature"
name = "Features"
showcontent = true

[[tool.towncrier.type]]
directory = "bugfix"
name = "Bugfixes"
showcontent = true

[[tool.towncrier.type]]
directory = "doc"
name = "Improved Documentation"
showcontent = true

[[tool.towncrier.type]]
directory = "removal"
name = "Deprecations and Removals"
showcontent = true

[[tool.towncrier.type]]
directory = "misc"
name = "Misc"
showcontent = true
